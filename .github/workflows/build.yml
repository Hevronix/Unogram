name: Unogram Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC dev cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Create Libraries & ThirdParty
        shell: powershell
        run: |
          $buildRoot = Split-Path (Split-Path $env:GITHUB_WORKSPACE) -Parent
          New-Item -ItemType Directory -Force -Path "$buildRoot\Libraries" | Out-Null
          New-Item -ItemType Directory -Force -Path "$buildRoot\ThirdParty" | Out-Null
          Write-Host "Libraries: $buildRoot\Libraries"
          Write-Host "ThirdParty: $buildRoot\ThirdParty"

      - name: Prepare libraries
        shell: cmd
        run: |
          for /f "delims=" %%i in ("%GITHUB_WORKSPACE%") do set "parent=%%~dpi"
          for /f "delims=" %%i in ("%parent%") do set "grandparent=%%~dpi"
          cd /d "%grandparent%"
          call "%GITHUB_WORKSPACE%\Telegram\build\prepare\win.bat"

      - name: Build Unogram
        shell: powershell
        run: |
          $env:CL = "/MP4"
          & "$env:GITHUB_WORKSPACE\build.ps1"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Unogram-build
          path: |
            out\**\*.exe
            out\**\*.dll
            **\build-*.log
            **\prepare-*.log
          if-no-files-found: warn

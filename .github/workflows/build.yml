name: Unogram Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Unogram
        shell: powershell
        run: |
          $env:CL="/MP4"
          powershell -NoProfile -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\build.ps1"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Unogram-build
          path: |
            out\**\*.exe
            out\**\*.dll
            Telegram\build-out.txt
            Telegram\build-err.txt
            build-*.log
            prepare-*.log
          if-no-files-found: warn
          compression-level: 0

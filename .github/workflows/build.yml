name: Unogram Build

on:
  workflow_dispatch:
  push:
  pull_request:

concurrency:
  group: unogram-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 360
    env:
      BUILD_CACHE_VERSION: v3
      BUILD_CONFIGURATION: Debug
      TDESKTOP_API_ID: "17349"
      TDESKTOP_API_HASH: "344583e45741c457fe1862106095a5eb"
      UNOGRAM_SKIP_BREAKPAD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Restore dependency build cache
        id: deps-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            Libraries
            ThirdParty
          key: ${{ runner.os }}-deps-${{ env.BUILD_CONFIGURATION }}-${{ env.BUILD_CACHE_VERSION }}-${{ hashFiles('Telegram/build/prepare/prepare.py', 'Telegram/build/prepare/win.bat', 'prepare-client-build.cmd', '.github/workflows/build.yml') }}
          restore-keys: |
            ${{ runner.os }}-deps-${{ env.BUILD_CONFIGURATION }}-${{ env.BUILD_CACHE_VERSION }}-
            ${{ runner.os }}-deps-${{ env.BUILD_CONFIGURATION }}-

      - name: Restore build cache
        id: build-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            out
            Telegram.exe
          key: ${{ runner.os }}-out-${{ github.ref_name }}-${{ env.BUILD_CONFIGURATION }}-${{ env.BUILD_CACHE_VERSION }}-${{ hashFiles('build.ps1', 'Telegram/configure.py', 'Telegram/CMakeLists.txt', 'Telegram/**/*.cmake', 'Telegram/**/*.cpp', 'Telegram/**/*.c', 'Telegram/**/*.h', 'Telegram/**/*.hpp', 'Telegram/**/*.ui', 'Telegram/**/*.qrc', 'cmake/**/*.cmake', 'CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-out-${{ github.ref_name }}-${{ env.BUILD_CONFIGURATION }}-${{ env.BUILD_CACHE_VERSION }}-
            ${{ runner.os }}-out-${{ github.ref_name }}-${{ env.BUILD_CONFIGURATION }}-
            ${{ runner.os }}-out-${{ env.BUILD_CONFIGURATION }}-

      - name: Cache WebView2 NuGet package
        uses: actions/cache@v4
        with:
          path: ~\.nuget\packages\microsoft.web.webview2
          key: ${{ runner.os }}-webview2-1.0.1901.177

      - name: Verify required paths
        shell: pwsh
        run: |
          $required = @(
            'build.ps1',
            'Telegram\configure.py',
            'Telegram\build\prepare\win.bat',
            'Telegram'
          )

          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Missing required path: $path"
            }
          }

      - name: Prepare libraries
        shell: cmd
        run: Telegram\build\prepare\win.bat skip-release silent

      - name: Build
        shell: pwsh
        run: .\build.ps1 *>&1 | Tee-Object -FilePath build-ci.log

      - name: Save dependency build cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            Libraries
            ThirdParty
          key: ${{ steps.deps-cache-restore.outputs.cache-primary-key }}

      - name: Save build cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            out
            Telegram.exe
          key: ${{ steps.build-cache-restore.outputs.cache-primary-key }}

      - name: Verify output
        if: success()
        shell: pwsh
        run: |
          if ((-not (Test-Path 'Telegram.exe')) -and (-not (Test-Path 'out\Debug\Telegram.exe'))) {
            throw 'Telegram.exe was not produced.'
          }

      - name: Upload result
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Unogram-Debug
          if-no-files-found: error
          path: |
            Telegram.exe
            out/Debug/Telegram.exe
            out/Debug/*.dll

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unogram-build-logs
          if-no-files-found: warn
          path: |
            build-ci.log
            build-debug-last.log
            build-last.log
            build-live-out.log
            build-live-err.log
            out/CMakeCache.txt

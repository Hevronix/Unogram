name: Unogram Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          path: Unogram

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Prepare build folders
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "D:\a\Unogram\Libraries" | Out-Null
          New-Item -ItemType Directory -Force -Path "D:\a\Unogram\ThirdParty" | Out-Null

      - name: Prepare libraries
        shell: powershell
        working-directory: D:\a\Unogram
        run: |
          & "D:\a\Unogram\Unogram\Telegram\build\prepare\win.bat"

      - name: Build Unogram
        shell: powershell
        working-directory: D:\a\Unogram\Unogram
        run: |
          $env:CL="/MP4"
          powershell -NoProfile -ExecutionPolicy Bypass -File ".\build.ps1"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Unogram-build
          path: |
            D:\a\Unogram\Unogram\out\**\*.exe
            D:\a\Unogram\Unogram\out\**\*.dll
            D:\a\Unogram\Unogram\build-*.log
            D:\a\Unogram\Unogram\prepare-*.log
            D:\a\Unogram\Unogram\Telegram\build-out.txt
            D:\a\Unogram\Unogram\Telegram\build-err.txt
          if-no-files-found: warn
          compression-level: 0

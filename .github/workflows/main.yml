name: Unogram Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Unogram
        shell: powershell
        run: |
          $vcvars = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          if (!(Test-Path $vcvars)) {
            $vcvars = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          }
          cmd /c "call `"$vcvars`" -vcvars_ver=14.44 && set CL_MPCount=4 && powershell -NoProfile -ExecutionPolicy Bypass -File ${{ github.workspace }}\build.ps1"

      - name: Upload Unogram artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Unogram-build
          path: |
            out\**\*.exe
            out\**\*.dll
            Telegram\build-out.txt
            Telegram\build-err.txt
          if-no-files-found: warn
          compression-level: 0
